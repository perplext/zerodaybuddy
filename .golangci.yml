run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
      # unusedwrite is noisy on test fixtures (struct literals set all fields
      # for shape documentation even when the test only asserts on a subset).
      - unusedwrite
  staticcheck:
    checks:
      - all

issues:
  exclude-dirs:
    - vendor
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # Test files routinely ignore error returns from setup helpers, mocks,
    # response-writer.Write/Encode in test HTTP handlers, and deferred Close/Shutdown.
    # Production code is still subject to errcheck.
    - path: _test\.go$
      linters:
        - errcheck
