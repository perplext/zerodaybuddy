name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.24' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    - name: Run unit tests
      run: go test ./... -short -race -coverprofile=coverage.out

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Build project
      run: go build -v ./cmd/zerodaybuddy

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # Pinned to 1.25.11 to clear GO-2026-5039 (net/textproto error
        # escaping) and GO-2026-5037 (crypto/x509 hostname parsing); 1.25.10
        # previously cleared GO-2026-4982 (html/template XSS). Bump to the next
        # 1.25.x patch when a security advisory targets this line again.
        go-version: '1.25.11'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        # Pinned to last v1 — v2 is a config-format breaking change that
        # requires migrating .golangci.yml. See docs/plans/2026-05-10-002-*.
        version: v1.64.8
        # Build golangci-lint from source using the runner's Go (1.25). The
        # prebuilt v1.64.8 binary was compiled with Go 1.24 and v1 refuses
        # to lint code targeting a newer Go than itself.
        install-mode: goinstall
        args: --timeout=3m

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # Pinned to 1.25.11 to clear GO-2026-5039 (net/textproto error
        # escaping) and GO-2026-5037 (crypto/x509 hostname parsing); 1.25.10
        # previously cleared GO-2026-4982 (html/template XSS). Bump to the next
        # 1.25.x patch when a security advisory targets this line again.
        go-version: '1.25.11'

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Run gosec
      # Run gosec with the runner's setup-go toolchain (above) rather than the
      # securego/gosec Docker image, whose pinned Go (GOTOOLCHAIN=local) is older
      # than this module's go directive and cannot load the packages.
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
        gosec ./...
